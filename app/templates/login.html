<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Manto Platform</title>
  <style>
    :root {
      --bg: #f4f2f7;
      --ink: #1f1f1f;
      --muted: #6b6b6b;
      --panel: #ffffff;
      --line: #e5e5e5;
      --accent: #3a63f3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
    }
    label { display: block; margin: 10px 0 6px; font-weight: 600; }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
    }
    .row {
      position: relative;
    }
    .toggle {
      position: absolute;
      right: 10px;
      top: 36px;
      background: transparent;
      border: 0;
      color: var(--muted);
      cursor: pointer;
    }
    .actions {
      margin-top: 16px;
    }
    button[type="submit"] {
      width: 100%;
      padding: 10px 12px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .links {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }
    .links a { color: var(--muted); text-decoration: none; }
    .error {
      color: #b12b2b;
      font-size: 13px;
      margin: 8px 0 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login</h1>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post">
      <label for="email">Usuário</label>
      <input id="email" type="email" name="email" required>

      <div class="row">
        <label for="password">Senha</label>
        <input id="password" type="password" name="password" required>
        <button class="toggle" type="button" onclick="togglePassword()">👁</button>
      </div>

      <div class="actions">
        <button type="submit">Entrar</button>
      </div>
    </form>

    <div class="links">
      <a href="#">Esqueceu sua senha? Entre em contato com administrador! </a>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
