<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar — Manto</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      {% if settings and settings.logo_path %}
        <img src="{{ settings.logo_path }}" alt="Logo" style="height:48px; margin:0 auto 12px;">
      {% endif %}
      <div class="auth-logo-name">Manto</div>
      <div class="auth-logo-tag">Plataforma de Gestão</div>
    </div>

    {% if error %}
      <div class="alert alert-error mb-16">{{ error }}</div>
    {% endif %}

    <form method="post" action="/auth/login">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%; margin-top:8px; justify-content:center;">
        Entrar
      </button>
    </form>
  </div>
</div>
<script src="/static/js/password-toggle.js"></script>
</body>
</html>
