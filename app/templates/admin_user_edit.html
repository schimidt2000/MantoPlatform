{% extends "admin_layout.html" %}
{% block content %}
  <h1>Editar usuário</h1>
  <div class="card">
    {% if error %}<p class="muted">{{ error }}</p>{% endif %}
    <form method="post">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div>
          <label>Nome</label>
          <input type="text" name="name" value="{{ user.name }}">
        </div>
        <div>
          <label>Email</label>
          <input type="email" name="email" value="{{ user.email }}">
        </div>
      </div>
      <label>
        <input type="checkbox" name="is_active" value="1" {% if user.is_active %}checked{% endif %}>
        Usuário ativo
      </label>
      <label>Cargo (roles)</label>
      <div class="card" style="margin:0; padding:10px;">
        {% for r in roles %}
          <label style="display:block; font-weight:400;">
            <input
              type="checkbox"
              name="roles"
              value="{{ r.id }}"
              {% if r in user.roles %}checked{% endif %}
            >
            {{ r.name }}
          </label>
        {% else %}
          <div class="muted">Nenhuma role cadastrada.</div>
        {% endfor %}
      </div>
      <div style="margin-top:12px;">
        <button class="btn btn-primary" type="submit">Salvar</button>
      </div>
    </form>
  </div>

  <div class="card" style="margin-top:16px;">
    <h3>Resetar senha</h3>
    <form method="post" action="{{ url_for('admin.reset_password', user_id=user.id) }}">
      <label>Senha temporária</label>
      <input type="text" name="temp_password" placeholder="Nova senha temporária">
      <div style="margin-top:12px;">
        <button class="btn" type="submit">Resetar</button>
      </div>
    </form>
  </div>
{% endblock %}
