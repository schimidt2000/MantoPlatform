<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Erro interno — Manto</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      background: var(--bg, #f4f3f8);
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: #c0392b;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text, #1a1a1a);
      margin-bottom: 0.75rem;
    }
    .error-desc {
      color: var(--text-muted, #666);
      margin-bottom: 2rem;
      max-width: 400px;
    }
    .error-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
<div class="error-page">
  <div class="error-code">500</div>
  <div class="error-title">Algo deu errado</div>
  <p class="error-desc">Ocorreu um erro inesperado. Nossa equipe já foi notificada. Tente novamente em alguns instantes.</p>
  <div class="error-actions">
    <a href="/" class="btn btn-primary">Ir para o início</a>
    <a href="javascript:history.back()" class="btn btn-secondary">Tentar novamente</a>
  </div>
</div>
</body>
</html>
