{% extends "admin_layout.html" %}
{% block content %}
  <h1>Criar usuário</h1>
  <div class="card">
    {% if msg %}<p class="muted">{{ msg }}</p>{% endif %}
    {% if error %}<p class="muted">{{ error }}</p>{% endif %}
    <form method="post">
      <label>Nome</label>
      <input name="name" required>

      <label>Email (login)</label>
      <input type="email" name="email" required>

      <label>Senha de primeiro uso</label>
      <input type="password" name="temp_password" required>

      <label>Cargo (roles)</label>
      <div class="card" style="margin:0; padding:10px;">
        {% for r in roles %}
          <label style="display:block; font-weight:400;">
            <input type="checkbox" name="roles" value="{{ r.id }}">
            {{ r.name }}
          </label>
        {% else %}
          <div class="muted">Nenhuma role cadastrada.</div>
        {% endfor %}
      </div>

      <div style="margin-top:12px;">
        <button class="btn btn-primary" type="submit">Criar</button>
      </div>
    </form>
  </div>
{% endblock %}
