<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Definir senha — Manto</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-name">Manto</div>
      <div class="auth-logo-tag">Primeiro acesso</div>
    </div>

    <p class="muted" style="margin-bottom:20px; font-size:13px;">
      Olá, <strong>{{ talent.full_name }}</strong>! Defina sua senha para continuar.
    </p>

    {% if error %}
      <div class="alert alert-error mb-16">{{ error }}</div>
    {% endif %}

    <form method="post">
      <div class="form-group">
        <label>Nova senha</label>
        <input type="password" name="new_password" placeholder="Mínimo 6 caracteres" required autofocus>
      </div>
      <div class="form-group">
        <label>Confirmar senha</label>
        <input type="password" name="confirm_password" placeholder="Repita a senha" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg"
              style="width:100%; margin-top:8px; justify-content:center;">
        Salvar senha
      </button>
    </form>
  </div>
</div>
</body>
</html>
