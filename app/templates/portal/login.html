<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal do Artista — Manto</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      {% if settings and settings.logo_path %}
        <img src="{{ settings.logo_path }}" alt="Logo" style="height:48px; margin:0 auto 12px;">
      {% endif %}
      <div class="auth-logo-name">Manto</div>
      <div class="auth-logo-tag">Portal do Artista</div>
    </div>

    {% if error %}
      <div class="alert alert-error mb-16">{{ error }}</div>
    {% endif %}

    <form method="post">
      <div class="form-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00"
               inputmode="numeric" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg"
              style="width:100%; margin-top:8px; justify-content:center;">
        Entrar
      </button>
    </form>

    <div style="margin-top:24px; display:flex; flex-direction:column; gap:10px;">

      <a href="/portal/first-access" style="
        display:flex; flex-direction:column; gap:3px;
        padding:14px 16px;
        border:2px solid var(--accent); border-radius:var(--r-md);
        text-decoration:none; background:rgba(84,69,150,0.05);
        transition: background .15s;">
        <span style="font-weight:700; font-size:14px; color:var(--accent);">
          Primeiro acesso →
        </span>
        <span style="font-size:12px; color:var(--muted);">
          Ainda não tenho senha — quero receber por email
        </span>
      </a>

      <a href="/portal/forgot-password" style="
        display:flex; flex-direction:column; gap:3px;
        padding:14px 16px;
        border:1px solid var(--line); border-radius:var(--r-md);
        text-decoration:none;
        transition: border-color .15s;">
        <span style="font-weight:700; font-size:14px; color:var(--text);">
          Esqueci minha senha →
        </span>
        <span style="font-size:12px; color:var(--muted);">
          Já tenho conta mas perdi o acesso
        </span>
      </a>

    </div>
  </div>
</div>
<script src="/static/js/password-toggle.js"></script>
</body>
</html>
