<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal do Artista — Manto</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      {% if settings and settings.logo_path %}
        <img src="{{ settings.logo_path }}" alt="Logo" style="height:48px; margin:0 auto 12px;">
      {% endif %}
      <div class="auth-logo-name">Manto</div>
      <div class="auth-logo-tag">Portal do Artista</div>
    </div>

    {% if error %}
      <div class="alert alert-error mb-16">{{ error }}</div>
    {% endif %}

    <form method="post">
      <div class="form-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00"
               inputmode="numeric" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg"
              style="width:100%; margin-top:8px; justify-content:center;">
        Entrar
      </button>
    </form>

    <div style="margin-top:20px; border-top:1px solid var(--line); padding-top:16px; text-align:center;">
      <a href="/portal/first-access" class="btn btn-secondary btn-lg"
         style="width:100%; justify-content:center;">
        Primeiro acesso
      </a>
      <a href="/portal/forgot-password"
         style="display:block; margin-top:12px; font-size:13px; color:var(--muted); text-align:center;">
        Esqueci minha senha
      </a>
    </div>
  </div>
</div>
</body>
</html>
