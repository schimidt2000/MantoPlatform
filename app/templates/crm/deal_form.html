{% extends "base.html" %}
{% block title %}{{ 'Editar lead' if deal else 'Novo lead' }}{% endblock %}
{% block page_title %}{{ 'Editar lead' if deal else 'Novo lead' }}{% endblock %}

{% block content %}
<div class="panel" style="max-width:560px;">
  <form method="post">
    <div class="form-group">
      <label>Título do lead *</label>
      <input type="text" name="title" value="{{ deal.title if deal else '' }}"
             placeholder="Ex: Festa da Ana — 5 anos" required style="width:100%;">
    </div>
    <div class="grid-2" style="gap:16px;">
      <div class="form-group">
        <label>Origem</label>
        <select name="source" style="width:100%;">
          <option value="">— selecione —</option>
          {% for val, label in sources %}
            <option value="{{ val }}" {% if deal and deal.source == val %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Valor estimado (R$)</label>
        <input type="number" name="value" min="0"
               value="{{ deal.value if deal else '' }}" style="width:100%;">
      </div>
    </div>
    <div class="form-group">
      <label>Vendedor responsável</label>
      <select name="assigned_to" style="width:100%;">
        {% for s in sellers %}
          <option value="{{ s.id }}" {% if deal and deal.assigned_to == s.id %}selected{% endif %}>{{ s.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Organização (opcional)</label>
      <select name="organization_id" style="width:100%;">
        <option value="">— nenhuma —</option>
        {% for org in organizations %}
          <option value="{{ org.id }}" {% if deal and deal.organization_id == org.id %}selected{% endif %}>{{ org.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Contato (opcional)</label>
      <select name="contact_id" style="width:100%;">
        <option value="">— nenhum —</option>
        {% for c in contacts %}
          <option value="{{ c.id }}" {% if deal and deal.contact_id == c.id %}selected{% endif %}>{{ c.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>WhatsApp do lead</label>
      <input type="text" name="contractor_whatsapp"
             value="{{ deal.contractor_whatsapp if deal else '' }}"
             placeholder="(11) 99999-9999" style="width:100%;">
    </div>
    <div style="display:flex; gap:8px; margin-top:8px;">
      <button type="submit" class="btn btn-primary">Salvar</button>
      <a href="{{ url_for('crm.pipeline') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
