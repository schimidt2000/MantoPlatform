{% extends "base.html" %}
{% block title %}{{ 'Editar contato' if contact.id else 'Novo contato' }}{% endblock %}
{% block page_title %}{{ 'Editar contato' if contact.id else 'Novo contato' }}{% endblock %}

{% block content %}
<div class="panel" style="max-width:480px;">
  <form method="post">
    <div class="form-group">
      <label>Nome *</label>
      <input type="text" name="name" value="{{ contact.name or '' }}" required style="width:100%;">
    </div>
    <div class="grid-2" style="gap:12px;">
      <div class="form-group">
        <label>CPF</label>
        <input type="text" name="cpf" value="{{ contact.cpf or '' }}" style="width:100%;">
      </div>
      <div class="form-group">
        <label>Telefone / WhatsApp</label>
        <input type="text" name="phone" value="{{ contact.phone or '' }}" style="width:100%;">
      </div>
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" name="email" value="{{ contact.email or '' }}" style="width:100%;">
    </div>
    <div class="form-group">
      <label>Organização</label>
      <select name="organization_id" style="width:100%;">
        <option value="">— nenhuma (cliente direto) —</option>
        {% for org in organizations %}
          <option value="{{ org.id }}" {% if contact.organization_id == org.id %}selected{% endif %}>{{ org.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Observações</label>
      <textarea name="notes" rows="3" style="width:100%;">{{ contact.notes or '' }}</textarea>
    </div>
    <div style="display:flex; gap:8px;">
      <button type="submit" class="btn btn-primary">Salvar</button>
      <a href="{{ url_for('crm.contacts') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
