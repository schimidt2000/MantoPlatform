<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alterar Senha — Manto</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-name">Manto</div>
      <div class="auth-logo-tag">Primeiro Acesso</div>
    </div>

    <h1 style="font-size:16px; font-weight:600; margin-bottom:6px;">Defina sua senha</h1>
    <p class="meta mb-16">Por segurança, crie uma senha pessoal antes de continuar.</p>

    {% if error %}
      <div class="alert alert-error mb-16">{{ error }}</div>
    {% endif %}

    <form method="post">
      <div class="form-group">
        <label for="password">Nova senha</label>
        <input type="password" id="password" name="password" placeholder="mínimo 6 caracteres" required autofocus>
      </div>
      <div class="form-group">
        <label for="confirm">Confirmar senha</label>
        <input type="password" id="confirm" name="confirm" placeholder="repita a senha" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%; justify-content:center; margin-top:8px;">
        Salvar e entrar
      </button>
    </form>
  </div>
</div>
<script src="/static/js/password-toggle.js"></script>
</body>
</html>
